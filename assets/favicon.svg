<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <defs>
        <radialGradient id="bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#d9a8ff"/>
            <stop offset="40%" stop-color="#6a28d4"/>
            <stop offset="100%" stop-color="#1a0830"/>
        </radialGradient>
        <radialGradient id="star" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#ffd966"/>
        </radialGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="1.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
    <!-- 外圈光暈背景 -->
    <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
    <!-- 外圈魔法環 -->
    <circle cx="32" cy="32" r="27" fill="none" stroke="#e8c2ff" stroke-width="1" opacity="0.6"/>
    <!-- 五角星 (連筆畫法) -->
    <path d="M32 9 L 40 48 L 9 23 L 55 23 L 24 48 Z"
          fill="url(#star)"
          stroke="#ffffff"
          stroke-width="1.5"
          stroke-linejoin="round"
          filter="url(#glow)"
          opacity="0.95"/>
    <!-- 中心光點 -->
    <circle cx="32" cy="32" r="2.5" fill="#ffffff" opacity="0.9"/>
</svg>
